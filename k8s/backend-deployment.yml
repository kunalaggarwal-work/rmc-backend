apiVersion: apps/v1
kind: Deployment
metadata:
    name: rmc-backend-deployment
    namespace: rmc-be
spec:
    replicas: 1
    selector:
        matchLabels:
            app: rmc-backend
    template:
        metadata:
          name: rmc-backend-pod
          namespace: rmc-be
          labels:
            app: rmc-backend
        spec:
          initContainers:
            - name: wait-for-db
              image: postgres:14
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
              command:
                - sh
                - -c
                - |
                  until PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres-service -U postgres -d postgres -c "SELECT 1" 2>/dev/null; do
                    echo "Waiting for PostgreSQL to be ready..."
                    sleep 3
                  done
                  echo "PostgreSQL is ready!"
              env:
                - name: POSTGRES_USER
                  value: postgres
                - name: POSTGRES_PASSWORD
                  value: allTech
          containers:
            - name: rmc-backend-container
              image: kunalaggarwal05/rmc-be:latest
              imagePullPolicy: Always
              ports:
                - containerPort: 9091
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "300m"
              env:
                - name: POSTGRES_USER
                  value: postgres
                - name: POSTGRES_PASSWORD
                  value: allTech
                - name: DB_HOST
                  value: postgres-service
                - name: DB_PORT
                  value: "5432"
                - name: DB_NAME
                  value: rmc_test
              startupProbe:
                httpGet:
                  path: /actuator/health
                  port: 9091
                initialDelaySeconds: 40
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 30
              readinessProbe:
                httpGet:
                  path: /actuator/health
                  port: 9091
                initialDelaySeconds: 20
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 3
              livenessProbe:
                httpGet:
                  path: /actuator/health
                  port: 9091
                initialDelaySeconds: 60
                periodSeconds: 15
                timeoutSeconds: 5
                failureThreshold: 3
